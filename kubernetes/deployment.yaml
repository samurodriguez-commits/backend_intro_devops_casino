apiVersion: apps/v1

kind: Deployment

metadata:
  name: casino-backend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-backend

  template:
    metadata:
      labels:
        app: casino-backend

    spec:
      containers:
      - name: casino-backend
        image: 546388928625.dkr.ecr.us-east-1.amazonaws.com/casino-backend:latest

        ports:
        - containerPort: 3000

        envFrom:
        - secretRef:
            name: casino-secrets

        resources:
          requests:
            cpu: "100m"

          limits:
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /livez
            port: 3000

          initialDelaySeconds: 10
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000

          initialDelaySeconds: 5
          periodSeconds: 10