name: Deploy casino-backend

on:
  push:
    branches:
      - deploy

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t casino-backend:${{ github.sha }} .

      - name: Tag Docker image
        run: |
          docker tag casino-backend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/casino-backend:${{ github.sha }}

          docker tag casino-backend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/casino-backend:latest

          docker tag casino-backend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/casino-backend:v1.0.0

      - name: Push Docker image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/casino-backend:${{ github.sha }}

          docker push \
          ${{ steps.login-ecr.outputs.registry }}/casino-backend:latest

          docker push \
          ${{ steps.login-ecr.outputs.registry }}/casino-backend:v1.0.0

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic casino-secrets \
            --from-literal=DB_URL='${{ secrets.DB_URL }}' \
            --from-literal=DB_HOST='postgres' \
            --from-literal=DB_PORT='5432' \
            --from-literal=DB_NAME='casino_db' \
            --from-literal=DB_USER='${{ secrets.DB_USER }}' \
            --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PostgreSQL first
        run: |
          kubectl apply -f kubernetes/postgres-configmap.yaml
          kubectl apply -f kubernetes/postgres-pvc.yaml
          kubectl apply -f kubernetes/postgres-deployment.yaml
          kubectl apply -f kubernetes/postgres-service.yaml
          kubectl rollout status deployment/postgres

      - name: Deploy backend to EKS
        run: |
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/hpa.yaml
          kubectl rollout restart deployment/casino-backend
          kubectl rollout status deployment/casino-backend